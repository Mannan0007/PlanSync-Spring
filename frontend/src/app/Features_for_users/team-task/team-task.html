<div class="main-div">
     <h2 class="text-center">Greetings {{name.name}}, Lets Create a team</h2>

     <div class="team-card d-flex flex-column">
        <div class="team-card-inner d-flex justify-content-center">
            <form action="" class="d-flex flex-column gap-2 ">
                <input type="text" placeholder="Name your team">
                <a href="">
                    <button class="btn btn-primary w-25"(click)="addButton()" >Create</button>
                </a>
               
                <!-- <button class="btn btn-primary"(click)="addButton()" >Add a teammate</button> -->
            </form>
        </div>

     </div>

    </div>
    <div class="member-modal d-flex flex-column" *ngIf="showModal">
        <div class="member-modal-inner">
            <form action="" class="d-flex flex-column gap-3">
                <input type="text" name="" id="" placeholder="Search for a teammate">
                
                <div class="d-flex gap-2 justify-content-center">
                    <button class="btn btn-success w-25 ">Search</button>
                    <button class="btn btn-danger w-25 " (click)="closeModal()">Close</button>
                </div>

                </form>
        </div>
    </div>


    <div class="d-flex flex-column justify-content-center text-center m-5">
