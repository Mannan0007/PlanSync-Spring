<div class="main-container">
    <div class="img-container">
        <img src="/assets/Gemini_Generated_Image_r4a1tzr4a1tzr4a1.png" alt="">
    </div>
    <div class="login-form d-flex flex-column">
        <form action="" class="" [formGroup]="loginForm">
            <span class="text-center">
                <h2 class="fs23">Welcome Back</h2>
            </span>
            <div class="d-flex flex-column">
                <label for="">Username</label>
                <input type="email" placeholder="Enter your username" formControlName="username">
                <div class="mt-1"
                    *ngIf="loginForm.get('username')?.invalid && (loginForm.get('username')?.touched || isSubmitted)">
                    <p class="error-validation">Please enter your username!</p>
                </div>
                <div class="d-flex flex-column">
                    <label for="">Password</label>
                    <input type="password" name="" id="" placeholder="Enter your password" formControlName="password">
                    <div class="mt-1"
                        *ngIf="loginForm.get('password')?.invalid && (loginForm.get('password')?.touched || isSubmitted)">
                        <p class="error-validation">Please fill your password!</p>
                    </div>
                </div>
            </div>
            <div class="d-flex justify-content-center">
                <button class="btn btn-success mt-3" (click)="Login()">Login</button>
            </div>
        </form>
        <div class="external-links d-flex gap-3 mt-3">
            <a href="/forgotpassword">Forgot Password?</a>
            <a href="/register">Don't have an account? Sign Up</a>

        </div>


    </div>

</div>

<ng-template #successModal>
    <div class="success-modal-header">
        <h4 class="modal-title">Login successfull</h4>
    </div>
    <div class="modal-body">
        <p>{{Responsemessage}}</p>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="closeSuccessModal()">Close</button>
    </div>

</ng-template>
<ng-template #errorModal>
    <div class="error-modal-header">
        <h4 class="modal-title">Login Failed</h4>
    </div>
    <div class="modal-body">
        <p>{{errorMessage}}</p>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="closeModal()">Close</button>
    </div>

</ng-template>
